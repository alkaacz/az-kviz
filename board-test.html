<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <title>AZ Kvíz – Board Test (M1)</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      display: flex;
      gap: 2rem;
      padding: 1.5rem;
      background: #f5f5f5;
      min-height: 100vh;
    }

    #board-wrap {
      flex: 1;
      max-width: 520px;
    }

    #board-wrap h2 { margin: 0 0 .5rem; }
    #board-wrap p  { margin: 0 0 1rem; font-size: .85rem; color: #555; }

    #board { background: #fff; border-radius: 8px; padding: .5rem; box-shadow: 0 1px 4px #0002; }

    aside {
      min-width: 220px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      padding: 1rem;
      box-shadow: 0 1px 4px #0002;
    }
    .card h3 { margin: 0 0 .75rem; font-size: 1rem; }

    .team-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: .3rem .5rem;
      border-radius: 4px;
      margin-bottom: .4rem;
      font-size: .95rem;
    }
    .team-row span { font-weight: bold; }
    .win-badge {
      font-size: .8rem;
      padding: .1rem .45rem;
      border-radius: 3px;
      background: #eee;
    }
    .win-badge.won { background: #c8e6c9; color: #256029; }

    .legend {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: .3rem .6rem;
      align-items: center;
      font-size: .85rem;
    }
    .swatch {
      width: 18px; height: 18px;
      border-radius: 3px;
      border: 1px solid #ccc;
    }

    button {
      padding: .5rem 1rem;
      border: none;
      border-radius: 4px;
      background: #1e88e5;
      color: #fff;
      cursor: pointer;
      font-size: .9rem;
    }
    button:hover { background: #1565c0; }
  </style>
</head>
<body>

<div id="board-wrap">
  <h2>Hrací plán – test</h2>
  <p>Kliknutím na pole cyklujete vlastníka: prázdné → A → B → C → černé → prázdné.</p>
  <div id="board"></div>
</div>

<aside>
  <div class="card">
    <h3>Stav výhry</h3>
    <div id="win-status"></div>
  </div>

  <div class="card">
    <h3>Legenda hran</h3>
    <div class="legend">
      <div class="swatch" style="background:#1e88e5"></div><div>Tým A – levá hrana</div>
      <div class="swatch" style="background:#e53935"></div><div>Tým B – pravá hrana</div>
      <div class="swatch" style="background:#43a047"></div><div>Tým C – spodní hrana</div>
      <div class="swatch" style="background:#d0d0d0"></div><div>Volné pole</div>
      <div class="swatch" style="background:#424242"></div><div>Zablokované</div>
    </div>
  </div>

  <div class="card">
    <h3>Akce</h3>
    <button id="btn-reset">Resetovat plán</button>
  </div>

  <div class="card" style="font-size:.8rem;color:#555">
    <strong>Indexy hran:</strong><br>
    A (levá):&nbsp;&nbsp;<span id="edge-a"></span><br>
    B (pravá):&nbsp;<span id="edge-b"></span><br>
    C (spodní): <span id="edge-c"></span>
  </div>
</aside>

<script type="module">
  import { createBoard, renderBoardSVG, checkWin, getEdgeFields } from './js/board.js';

  const TEAMS = [
    { id: 'A', label: 'Tým A', color: '#1e88e5' },
    { id: 'B', label: 'Tým B', color: '#e53935' },
    { id: 'C', label: 'Tým C', color: '#43a047' },
  ];
  const OWNER_CYCLE = [null, 'A', 'B', 'C', 'BLACK'];

  let board = createBoard();

  function updateWinStatus() {
    const container = document.getElementById('win-status');
    container.innerHTML = TEAMS.map(({ id, label, color }) => {
      const won = checkWin(board, id);
      return `
        <div class="team-row" style="background:${color}22">
          <span style="color:${color}">${label}</span>
          <span class="win-badge ${won ? 'won' : ''}">${won ? '🏆 Vyhrál!' : 'nehraje'}</span>
        </div>`;
    }).join('');
  }

  function render() {
    renderBoardSVG(board, document.getElementById('board'), index => {
      const field = board[index];
      const next = (OWNER_CYCLE.indexOf(field.owner) + 1) % OWNER_CYCLE.length;
      field.owner = OWNER_CYCLE[next];
      render();
    });
    updateWinStatus();
  }

  document.getElementById('btn-reset').addEventListener('click', () => {
    board = createBoard();
    render();
  });

  // Show edge indices
  const edges = getEdgeFields();
  document.getElementById('edge-a').textContent = edges.A.join(', ');
  document.getElementById('edge-b').textContent = edges.B.join(', ');
  document.getElementById('edge-c').textContent = edges.C.join(', ');

  render();
</script>
</body>
</html>
